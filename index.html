<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- Header / Navbar -->
    <header class="main-header">
        <div class="wrapper navbar-flex">
            
            <div class="brand-area">
                <img src="./assets/logo.png" alt="DevConf Logo" class="brand-img">
                <span class="brand-text">DEVCONF 2026</span>
            </div>
            
            <nav class="menu-area">
                <a href="#" class="menu-item">Speakers</a>
                <a href="#" class="menu-item">Schedule</a>
                <a href="#" class="menu-item">Tracks</a>
                <a href="#" class="menu-item">Venue</a>
                <a href="#" class="menu-item">Blog</a>
            </nav>
            
            <div class="action-area">
                <a href="#" class="btn cta-btn">Register Now</a>
            </div>

        </div>
    </header>

    <!-- Main Banner Area -->
    <section class="banner-area">
        <div class="banner-bg-overlay"></div>
        <div class="wrapper banner-content-wrap">
            <h1 class="banner-heading">Code. <span class="highlight-italic">Connect</span>. Create</h1>
            <p class="banner-subtext">Join thousands of developers, designers, and tech enthusiasts at the premier tech conference of the year. Experience hands-on workshops, insightful keynotes, and unmatched networking opportunities.</p>
            <div class="banner-btn-group">
                <button class="btn cta-btn banner-cta">Register Now</button>
            </div>
        </div>
    </section>

</body>
</html>
